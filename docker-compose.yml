version: '3.8'

services:

  # ===========================================================================
  # Backend — FastAPI + YOLOv8
  # NOT exposed to the host directly; nginx proxies to it by container name.
  # ===========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yolo-backend
    volumes:
      - ./models:/app/models:ro
      - backend-temp:/tmp
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/models/best.pt
    # No ports: section — backend is internal only.
    # Direct port exposure would let clients bypass nginx and hit the API
    # without going through the WebSocket upgrade headers nginx adds.
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ===========================================================================
  # Frontend — React built by Vite, served by nginx
  # nginx also proxies /api/* and /ws/* to the backend container.
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # FIX: do NOT bake in localhost URLs. Vite embeds build args into the
        # JS bundle at build time. "localhost" in the bundle means the user's
        # own machine — not your server. Instead we use relative paths (/ws,
        # /api) so the browser sends requests back to the same host that served
        # the page. nginx then proxies them to the backend container.
        - VITE_WS_URL=
        - VITE_API_URL=
    container_name: yolo-frontend
    ports:
      - "80:80"       # HTTP  — change to "443:443" when you add TLS
      - "3000:80"     # also expose on 3000 for local dev convenience
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  backend-temp:
    driver: local

networks:
  default:
    name: yolo-network
    driver: bridge