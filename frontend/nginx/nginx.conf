server {
    listen $PORT;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # BACKEND_HOST is injected at container startup via envsubst.
    # On Railway set this variable to your backend's private domain,
    # e.g. backend.railway.internal
    # On local Docker Compose it stays as "backend" (the service name).
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend "http://$BACKEND_HOST:8000";

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /ws/ {
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    location /upload {
        proxy_pass $backend/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }
}