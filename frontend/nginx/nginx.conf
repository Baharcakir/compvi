server {
    listen 80;
    server_name _;

    # -------------------------------------------------------------------------
    # Frontend static files
    # -------------------------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Serve the React SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for Docker healthcheck
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # -------------------------------------------------------------------------
    # WebSocket proxy — /ws/detect → backend:8000/ws/detect
    #
    # FIX: WebSocket upgrades require specific headers that plain HTTP proxying
    # doesn't send. Without Upgrade and Connection headers the backend receives
    # a plain HTTP request and returns 400. The frontend then sees a failed
    # connection and closes — this is the "camera closes" symptom on a deployed
    # app even when everything works locally.
    # -------------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://backend:8000;

        # WebSocket upgrade headers — both are required
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client info through
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WebSocket connections alive for long-running streams.
        # 300s matches the backend's WS_RECEIVE_TIMEOUT + ping interval.
        # Without this, nginx's default 60s read timeout silently kills the
        # connection mid-session — another "camera closes" cause.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Disable proxy buffering — we need binary frame bytes to flow
        # through immediately, not be held until a buffer fills.
        proxy_buffering off;
    }

    # -------------------------------------------------------------------------
    # REST API proxy — /upload and any future /api/* → backend:8000
    # -------------------------------------------------------------------------
    location /upload {
        proxy_pass http://backend:8000/upload;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Large video uploads need a high body size limit and long timeouts
        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # SSE (Server-Sent Events) needs unbuffered streaming too
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
    }
}